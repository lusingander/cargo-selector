name: Pinact

on:
  push:
    branches:
      - '*'
    paths:
      - .github/**
  pull_request:
    branches:
      - master
    paths:
      - .github/**

jobs:
  pinact:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Pinact
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          skip_push: "true"
          fix: "false"
          verify: "true"
          excludes: |
            dtolnay/rust-toolchain
